<!doctype html>
<html lang="pt-BR">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<title>Conversor Dólar → Real</title>
	<link rel="stylesheet" href="3.pagina.css">
	<style>/* fallback if external CSS fails */</style>
</head>
<body>
	<main class="card">
		<h1>Conversor Dólar → Real</h1>
		<p class="lead">Insira o valor em dólares e a cotação para converter para reais.</p>

		<label class="field">
			<span>Valor (USD)</span>
			<input id="usdAmount" type="number" min="0" step="0.01" placeholder="Ex: 10.50">
		</label>

		<label class="field">
			<span>Cotação (BRL por USD)</span>
			<input id="exchangeRate" type="number" min="0" step="0.01" value="5.10">
		</label>

		<div class="actions">
			<button id="convertBtn" class="btn primary">Converter</button>
			<button id="swapBtn" class="btn ghost" title="Resetar">Limpar</button>
		</div>

		<div id="result" class="result" aria-live="polite"></div>
		<small class="note">Conversor simples — valores arredondados para duas casas decimais.</small>
	</main>

	<script src="3.pagina.js"></script>
</body>
</html>
