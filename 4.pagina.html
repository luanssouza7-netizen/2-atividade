<!doctype html>
<html lang="pt-BR">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<title>Conversor Minutos → Segundos</title>
	<link rel="stylesheet" href="4.pagina.css">
</head>
<body>
	<main class="card">
		<h1>Conversor Minutos → Segundos</h1>
		<p class="lead">Converta minutos em segundos de forma rápida.</p>

		<label class="field">
			<span>Minutos</span>
			<input id="minutes" type="number" min="0" step="0.01" placeholder="Ex: 2.5">
		</label>

		<div class="actions">
			<button id="convert" class="btn primary">Converter</button>
			<button id="reset" class="btn ghost">Limpar</button>
		</div>

		<div id="out" class="result" aria-live="polite"></div>
		<small class="note">Entrada em minutos; saída em segundos (2 casas decimais quando aplicável).</small>
	</main>

	<script src="4.pagina.js"></script>
</body>
</html>
